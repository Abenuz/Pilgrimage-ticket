<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የመንፈሳዊ በረከት ጉዞ ትኬት</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            background: #121212;
            color: white;
        }
        
        .ticket-container {
            max-width: 450px;
            margin: 2rem auto;
            position: relative;
            background: #000;
            border: 1px solid #333;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header-bg {
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.8)), url('image_57e361.jpg');
            background-size: cover;
            background-position: center;
            height: 200px;
            display: flex;
            align-items: flex-end;
            padding: 1.5rem;
        }

        .ticket-cutout {
            position: relative;
        }

        .ticket-cutout::before, .ticket-cutout::after {
            content: "";
            position: absolute;
            width: 24px;
            height: 24px;
            background: #121212;
            border-radius: 50%;
            top: -12px;
            z-index: 10;
        }
        .ticket-cutout::before { left: -12px; }
        .ticket-cutout::after { right: -12px; }

        .divider {
            border-top: 2px dashed #333;
            margin: 0 1rem;
        }

        @media print {
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            .ticket-container { 
                margin: 0; 
                box-shadow: none; 
                border: 1px solid #eee;
                max-width: 100%;
            }
            .header-bg { -webkit-print-color-adjust: exact; }
            .ticket-cutout::before, .ticket-cutout::after { background: white; }
        }

        .shimmer {
            background: linear-gradient(90deg, #1a1a1a 0%, #333 50%, #1a1a1a 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="p-4">

    <div class="ticket-container">
        <!-- Header Image Section -->
        <div class="header-bg">
            <h1 class="text-white text-xl font-black tracking-tight">
                <span class="bg-purple-700 px-2 py-1 rounded mr-2 text-sm">†</span> 
                ታላቅ መንፈሳዊ የበረከት ጉዞ
                <span class="bg-purple-700 px-2 py-1 rounded ml-2 text-sm">†</span>
            </h1>
        </div>

        <!-- Main Content -->
        <div class="p-6 space-y-6">
            
            <!-- Destination -->
            <div class="flex items-start gap-4">
                <div class="text-2xl">📍</div>
                <div>
                    <p class="text-gray-500 text-xs font-bold uppercase mb-1">መድረሻ (Destination)</p>
                    <p class="text-lg font-bold text-white">ቤዛዊት ማርያም ገዳም</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <!-- Date -->
                <div class="flex items-start gap-4">
                    <div class="text-2xl">📅</div>
                    <div>
                        <p class="text-gray-500 text-xs font-bold uppercase mb-1">ቀን (Date)</p>
                        <p class="font-bold text-white">ግንቦት 9 / 2018</p>
                    </div>
                </div>
                <!-- Time -->
                <div class="flex items-start gap-4">
                    <div class="text-2xl">⏰</div>
                    <div>
                        <p class="text-gray-500 text-xs font-bold uppercase mb-1">ሰዓት (Time)</p>
                        <p class="font-bold text-white">12:00 ጠዋት</p>
                    </div>
                </div>
            </div>

            <!-- Pickup -->
            <div class="flex items-start gap-4">
                <div class="text-2xl">📍</div>
                <div>
                    <p class="text-gray-500 text-xs font-bold uppercase mb-1">መነሻ ቦታ (Pickup)</p>
                    <p class="font-bold text-white">ቶታል ኪዳነ ምህረት</p>
                </div>
            </div>

            <!-- Price -->
            <div class="flex items-start gap-4">
                <div class="text-2xl">💰</div>
                <div>
                    <p class="text-gray-500 text-xs font-bold uppercase mb-1">የጉዞ ዋጋ (Price)</p>
                    <p class="font-bold text-white">ከነ መስተንግዶ 450 ብር</p>
                </div>
            </div>

            <div class="divider"></div>
            <div class="ticket-cutout"></div>

            <!-- Contact & Footer -->
            <div class="flex flex-col gap-4">
                <div class="flex items-center gap-4">
                    <div class="text-2xl">📞</div>
                    <div>
                        <p class="text-gray-500 text-xs font-bold uppercase mb-1">ስልክ (Contact)</p>
                        <p class="font-mono text-sm text-white">0970984440 / 0948456209</p>
                    </div>
                </div>

                <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl flex items-center justify-center gap-3">
                    <span class="text-xl">🙏</span>
                    <p class="text-sm font-bold text-gray-200">ከእኛ ጋር በመጓዝ በረከትን ያግኙ!</p>
                </div>
            </div>

            <!-- Decorative Barcode -->
            <div class="pt-4 flex flex-col items-center opacity-40">
                <div class="flex gap-[2px] h-10 w-full max-w-[200px]">
                    <div class="flex-1 bg-white"></div>
                    <div class="w-2 bg-white"></div>
                    <div class="w-[1px] bg-white"></div>
                    <div class="w-3 bg-white"></div>
                    <div class="flex-1 bg-white"></div>
                    <div class="w-[1px] bg-white"></div>
                    <div class="w-4 bg-white"></div>
                    <div class="flex-1 bg-white"></div>
                </div>
                <p class="text-[9px] font-mono mt-2 tracking-widest">BEZAWIT-MARIAM-2018</p>
            </div>
        </div>
    </div>

    <!-- Floating Print Button -->
    <button onclick="window.print()" class="no-print fixed bottom-8 right-8 bg-white text-black font-bold px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 hover:scale-105 transition-transform active:scale-95">
        <span>🖨️</span> ትኬቱን አትም (Print Ticket)
    </button>

</body>
</html>
