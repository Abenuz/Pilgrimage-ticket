<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የመንፈሳዊ በረከት ጉዞ ትኬት</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            background: #121212;
            color: white;
        }
        
        .ticket-container {
            max-width: 450px;
            margin: 1.5rem auto;
            position: relative;
            background: #000;
            border: 1px solid #333;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .header-bg {
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.9)), url('image_57e361.jpg');
            background-size: cover;
            background-position: center;
            height: 180px;
            display: flex;
            align-items: flex-end;
            padding: 1.5rem;
        }

        .ticket-cutout {
            position: relative;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ticket-cutout::before, .ticket-cutout::after {
            content: "";
            position: absolute;
            width: 30px;
            height: 30px;
            background: #121212; /* Matches body background */
            border-radius: 50%;
            z-index: 10;
        }
        .ticket-cutout::before { left: -15px; }
        .ticket-cutout::after { right: -15px; }

        .dashed-line {
            width: 100%;
            border-top: 2px dashed #333;
        }

        #qrcode img {
            margin: 0 auto;
            border: 8px solid white;
            border-radius: 8px;
        }

        @media print {
            body { background: white !important; color: black !important; padding: 0; }
            .no-print { display: none !important; }
            .ticket-container { 
                margin: 0 auto; 
                box-shadow: none; 
                border: 1px solid #ddd;
                max-width: 100%;
            }
            .header-bg { -webkit-print-color-adjust: exact; border-bottom: 1px solid #eee; }
            .ticket-cutout::before, .ticket-cutout::after { background: white !important; border: 1px solid #ddd; }
            .dashed-line { border-top: 2px dashed #ccc; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="ticket-container" id="printable-ticket">
        <!-- Header -->
        <div class="header-bg">
            <h1 class="text-white text-xl font-black flex items-center gap-2">
                <span class="bg-purple-700 w-8 h-8 flex items-center justify-center rounded-lg shadow-lg">†</span> 
                ታላቅ መንፈሳዊ የበረከት ጉዞ
                <span class="bg-purple-700 w-8 h-8 flex items-center justify-center rounded-lg shadow-lg">†</span>
            </h1>
        </div>

        <div class="p-6 space-y-5">
            <!-- QR Section -->
            <div class="flex flex-col items-center justify-center py-2 bg-zinc-900/50 rounded-2xl border border-white/5">
                <div id="qrcode" class="mb-2"></div>
                <p class="text-[10px] text-gray-500 font-mono tracking-tighter">SCAN TO VERIFY TICKET</p>
            </div>

            <!-- Destination -->
            <div class="flex items-start gap-4">
                <span class="text-2xl">📍</span>
                <div>
                    <p class="text-purple-400 text-[10px] font-bold uppercase tracking-widest">መድረሻ (DESTINATION)</p>
                    <p class="text-xl font-black text-white">ቤዛዊት ማርያም ገዳም</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-gray-500 text-[10px] font-bold uppercase mb-1">ቀን (DATE)</p>
                    <p class="font-bold text-white">ግንቦት 9 / 2018</p>
                </div>
                <div>
                    <p class="text-gray-500 text-[10px] font-bold uppercase mb-1">ሰዓት (TIME)</p>
                    <p class="font-bold text-white">12:00 ጠዋት</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-white/5 pt-4">
                <div>
                    <p class="text-gray-500 text-[10px] font-bold uppercase mb-1 text-orange-400">መነሻ ቦታ (PICKUP)</p>
                    <p class="font-bold text-white text-sm">ቶታል ኪዳነ ምህረት</p>
                </div>
                <div>
                    <p class="text-gray-500 text-[10px] font-bold uppercase mb-1 text-green-400">ዋጋ (PRICE)</p>
                    <p class="font-bold text-white text-sm">450 ብር (ከነ መስተንግዶ)</p>
                </div>
            </div>

            <div class="ticket-cutout">
                <div class="dashed-line"></div>
            </div>

            <!-- Contact -->
            <div class="space-y-3">
                <div class="flex items-center justify-between text-xs">
                    <span class="text-gray-500 uppercase font-bold">ስልክ (Contact)</span>
                    <span class="text-white font-mono">0970984440 / 0948456209</span>
                </div>

                <div class="bg-gradient-to-r from-purple-900/20 to-zinc-900 p-4 rounded-xl border border-purple-500/20 text-center">
                    <p class="text-sm font-bold text-gray-200">🙏 ከእኛ ጋር በመጓዝ በረከትን ያግኙ!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="max-w-[450px] mx-auto flex gap-3 no-print">
        <button onclick="window.print()" class="flex-1 bg-white text-black font-bold px-6 py-4 rounded-2xl shadow-xl flex items-center justify-center gap-2 hover:bg-gray-200 transition-all active:scale-95">
            <span>🖨️</span> ትኬቱን አትም
        </button>
    </div>

    <script>
        // Generate QR Code on Load
        window.onload = function() {
            new QRCode(document.getElementById("qrcode"), {
                text: "https://abenuz.github.io/Pilgrimage-ticket/",
                width: 120,
                height: 120,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        };
    </script>

</body>
</html>
