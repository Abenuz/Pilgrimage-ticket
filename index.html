<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ታላቅ መንፈሳዊ የበረከት ጉዞ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            background-color: #1a1a1a;
            color: white;
        }
        .ticket-border {
            border: 2px solid #333;
            background-color: #000;
        }
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; color: black; }
            .ticket-border { border: 1px solid #000; background-color: white; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Main Ticket Container -->
    <div class="ticket-border w-full max-w-md rounded-2xl overflow-hidden shadow-2xl">
        
        <!-- Header Image -->
        <div class="w-full h-56 relative">
            <img src="image_57fa3f.jpg" alt="Bezawit Mariam" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x200?text=Bezawit+Mariam'">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
        </div>

        <!-- Ticket Content -->
        <div class="p-6 space-y-6">
            
            <!-- Title -->
            <div class="flex items-center justify-center gap-2 mb-4">
                <span class="text-purple-500 text-xl">✝</span>
                <h1 class="text-xl font-bold text-center tracking-wide">ታላቅ መንፈሳዊ የበረከት ጉዞ</h1>
                <span class="text-purple-500 text-xl">✝</span>
            </div>

            <!-- Details List -->
            <div class="space-y-4">
                <!-- Destination -->
                <div class="flex items-center gap-4">
                    <span class="text-2xl">📍</span>
                    <div>
                        <p class="text-sm font-bold leading-tight">መድረሻ፡ ቤዛዊት ማርያም ገዳም</p>
                    </div>
                </div>

                <!-- Date -->
                <div class="flex items-center gap-4">
                    <span class="text-2xl">📅</span>
                    <div>
                        <p class="text-sm font-bold leading-tight">የጉዞ ቀን፡ ግንቦት 9 / 2018</p>
                    </div>
                </div>

                <!-- Time -->
                <div class="flex items-center gap-4">
                    <span class="text-2xl">⏰</span>
                    <div>
                        <p class="text-sm font-bold leading-tight">መነሻ ሰዓት፡ 12 ሰዓት ጠዋት</p>
                    </div>
                </div>

                <!-- Pickup -->
                <div class="flex items-center gap-4">
                    <span class="text-2xl">📍</span>
                    <div>
                        <p class="text-sm font-bold leading-tight">መነሻ ቦታ፡ ቶታል ኪዳነ ምህረት</p>
                    </div>
                </div>

                <!-- Price -->
                <div class="flex items-center gap-4">
                    <span class="text-2xl">💰</span>
                    <div>
                        <p class="text-sm font-bold leading-tight">የጉዞ ዋጋ፡ ከነ መስተንግዶ 450 ብር</p>
                    </div>
                </div>

                <!-- Contact -->
                <div class="flex items-center gap-4 pt-2 border-t border-gray-800">
                    <span class="text-2xl">📞</span>
                    <div>
                        <p class="text-sm font-bold tracking-widest text-gray-300">0970984440 / 0948456209</p>
                    </div>
                </div>
            </div>

            <!-- Footer Message -->
            <div class="text-center pt-4 italic text-yellow-500">
                <p class="text-sm">🙏 ከእኛ ጋር በመጓዝ በረከትን ያግኙ!</p>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="no-print mt-8 flex flex-col items-center gap-4">
        <button onclick="window.print()" class="bg-white text-black font-bold px-8 py-3 rounded-full hover:bg-gray-200 transition-colors shadow-lg">
            🖨️ ትኬቱን አትም (Print Ticket)
        </button>
        <p class="text-gray-500 text-[10px] uppercase tracking-widest">Developed by Abenezer Zerihun</p>
    </div>

</body>
</html>
