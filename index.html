<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የመንፈሳዊ በረከት ጉዞ ትኬት</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            background: #f0f2f5;
        }
        .ticket-clip {
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 2% 50%);
        }
        @media print {
            .no-print { display: none; }
            body { background: white; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Ticket Container -->
    <div id="ticket" class="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-md w-full border-t-8 border-green-600">
        
        <!-- Header Image (The Monastery) -->
        <div class="relative h-56 bg-gray-200">
            <img src="image_57fa3f.jpg" alt="Monastery" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent flex items-end p-6">
                <h1 class="text-white text-2xl font-bold">† ታላቅ መንፈሳዊ የበረከት ጉዞ †</h1>
            </div>
        </div>

        <!-- Ticket Details -->
        <div class="p-6 space-y-4">
            <div class="flex items-center space-x-4 text-gray-700">
                <span class="text-2xl">📍</span>
                <div>
                    <p class="text-xs text-gray-500">መድረሻ</p>
                    <p class="font-bold text-lg">ቤዛዊት ማርያም ገዳም</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="flex items-center space-x-3 text-gray-700">
                    <span class="text-xl">📅</span>
                    <div>
                        <p class="text-xs text-gray-500">የጉዞ ቀን</p>
                        <p class="font-semibold">ግንቦት 9 / 2018</p>
                    </div>
                </div>
                <div class="flex items-center space-x-3 text-gray-700">
                    <span class="text-xl">⏰</span>
                    <div>
                        <p class="text-xs text-gray-500">መነሻ ሰዓት</p>
                        <p class="font-semibold">12 ሰዓት ጠዋት</p>
                    </div>
                </div>
            </div>

            <div class="flex items-center space-x-4 text-gray-700">
                <span class="text-2xl">🚩</span>
                <div>
                    <p class="text-xs text-gray-500">መነሻ ቦታ</p>
                    <p class="font-semibold">ቶታል ኪዳነ ምህረት</p>
                </div>
            </div>

            <div class="flex items-center justify-between py-4 border-y border-dashed border-gray-300">
                <div class="flex items-center space-x-3">
                    <span class="text-xl">💰</span>
                    <div>
                        <p class="text-xs text-gray-500">የጉዞ ዋጋ</p>
                        <p class="font-bold text-xl text-green-700">450 ብር</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-400">ከነ መስተንግዶው</p>
                </div>
            </div>

            <!-- Contact & Footer -->
            <div class="bg-gray-50 p-4 rounded-xl space-y-2">
                <p class="flex items-center text-sm text-gray-600">
                    <span class="mr-2">📞</span> 0970984440 / 0948456209
                </p>
                <p class="text-center font-bold text-green-800 pt-2 border-t border-gray-200">
                    🙏 ከእኛ ጋር በመጓዝ በረከትን ያግኙ!
                </p>
            </div>
        </div>

        <!-- Fake Perforation -->
        <div class="relative h-4 bg-gray-100 flex items-center justify-center">
            <div class="w-full border-t-2 border-dashed border-gray-300"></div>
            <div class="absolute -left-4 w-8 h-8 bg-gray-200 rounded-full"></div>
            <div class="absolute -right-4 w-8 h-8 bg-gray-200 rounded-full"></div>
        </div>
        
        <!-- Bottom Section -->
        <div class="p-6 bg-gray-100 text-center">
            <p class="text-xs text-gray-400 uppercase tracking-widest mb-2">Ticket ID: PILGRIM-2018-09</p>
            <div class="inline-block bg-white p-2 rounded-lg shadow-sm">
                <!-- Simple Mock Barcode -->
                <div class="flex space-x-1 h-8 items-center">
                    <div class="w-1 bg-black h-full"></div>
                    <div class="w-0.5 bg-black h-full"></div>
                    <div class="w-2 bg-black h-full"></div>
                    <div class="w-1 bg-black h-full"></div>
                    <div class="w-0.5 bg-black h-full"></div>
                    <div class="w-1.5 bg-black h-full"></div>
                    <div class="w-1 bg-black h-full"></div>
                    <div class="w-2 bg-black h-full"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="mt-8 no-print flex space-x-4">
        <button onclick="window.print()" class="bg-green-600 text-white px-6 py-2 rounded-full font-bold shadow-lg hover:bg-green-700 transition">
            ትኬቱን አትም (Print)
        </button>
    </div>

</body>
</html>
