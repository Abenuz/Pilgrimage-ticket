<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የመንፈሳዊ በረከት ጉዞ ትኬት</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            background-color: #f3f4f6;
        }
        /* This ensures the image looks good on all screens */
        .header-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 4px solid #16a34a;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-200">
        
        <!-- 1. ADDING THE IMAGE -->
        <!-- Make sure image_57fa3f.jpg is uploaded to the same folder as this index.html file -->
        <div class="relative">
            <img src="image_57fa3f.jpg" alt="Bezawit Mariam Monastery" class="header-image">
            <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 p-4">
                <h1 class="text-white text-xl font-bold">† ታላቅ መንፈሳዊ የበረከት ጉዞ †</h1>
            </div>
        </div>

        <!-- Ticket Body -->
        <div class="p-6 space-y-5">
            <div class="flex items-start space-x-4">
                <span class="text-2xl">📍</span>
                <div>
                    <p class="text-gray-500 text-xs">መድረሻ (Destination)</p>
                    <p class="font-bold text-lg text-gray-800">ቤዛዊት ማርያም ገዳም</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 bg-green-50 p-3 rounded-lg">
                <div>
                    <p class="text-gray-500 text-xs">ቀን (Date)</p>
                    <p class="font-bold text-gray-800">ግንቦት 9 / 2018</p>
                </div>
                <div>
                    <p class="text-gray-500 text-xs">ሰዓት (Time)</p>
                    <p class="font-bold text-gray-800">12:00 ጠዋት</p>
                </div>
            </div>

            <div class="flex items-start space-x-4">
                <span class="text-2xl">🚩</span>
                <div>
                    <p class="text-gray-500 text-xs">መነሻ ቦታ (Pickup)</p>
                    <p class="font-semibold text-gray-800">ቶታል ኪዳነ ምህረት</p>
                </div>
            </div>

            <div class="border-t border-dashed border-gray-300 pt-4 flex justify-between items-center">
                <div>
                    <p class="text-gray-500 text-xs">የጉዞ ዋጋ (Price)</p>
                    <p class="text-2xl font-black text-green-700">450 ብር</p>
                    <p class="text-[10px] text-gray-400">ከነ መስተንግዶው (Including Refreshments)</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-gray-400">ስልክ ቁጥር</p>
                    <p class="text-sm font-bold text-gray-700">0970984440</p>
                    <p class="text-sm font-bold text-gray-700">0948456209</p>
                </div>
            </div>

            <div class="bg-gray-100 p-3 rounded-md text-center">
                <p class="text-green-800 font-bold text-sm">🙏 ከእኛ ጋር በመጓዝ በረከትን ያግኙ!</p>
            </div>
        </div>

        <!-- Footer / Barcode decoration -->
        <div class="bg-gray-50 p-4 border-t flex flex-col items-center">
            <div class="flex space-x-1 mb-2">
                <div class="w-1 h-6 bg-gray-400"></div>
                <div class="w-0.5 h-6 bg-gray-400"></div>
                <div class="w-2 h-6 bg-gray-400"></div>
                <div class="w-1 h-6 bg-gray-400"></div>
                <div class="w-0.5 h-6 bg-gray-400"></div>
                <div class="w-1 h-6 bg-gray-400"></div>
            </div>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">Authorized Ticket</p>
        </div>
    </div>

</body>
</html>
