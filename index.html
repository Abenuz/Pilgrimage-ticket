<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>መንፈሳዊ የበረከት ጉዞ - Abenezer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .ticket-card {
            width: 100%;
            max-width: 400px;
            /* Update 'image_4c2574.jpg' to your actual filename on GitHub */
            background-image: url('image_4c2574.jpg'); 
            background-size: cover;
            background-position: center;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            border: 2px solid #fbbf24;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-overlay {
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(0,0,0,0.9));
            backdrop-filter: blur(4px);
            padding: 32px;
            height: 100%;
        }

        .qr-container {
            background: white;
            padding: 10px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .gold-text {
            color: #fbbf24;
        }

        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .ticket-card { box-shadow: none; border: 1px solid #ccc; }
        }
    </style>
</head>
<body>

    <div class="ticket-card" id="ticket">
        <div class="glass-overlay">
            
            <div class="text-center mb-6">
                <div class="inline-block px-4 py-1 rounded-full bg-amber-500/20 border border-amber-500/50 text-amber-400 text-xs font-bold mb-3 tracking-widest uppercase">
                    Official Pilgrimage Pass
                </div>
                <h1 class="text-3xl font-black mb-1">መንፈሳዊ ጉዞ</h1>
                <p class="text-amber-500 text-sm font-bold">ወደ ቤዛዊት ማርያም ገዳም</p>
            </div>

            <div class="space-y-4 mb-8 bg-black/40 p-4 rounded-xl border border-white/10">
                <div class="flex justify-between items-center border-b border-white/10 pb-2">
                    <span class="text-gray-400 text-xs">የጉዞ ቀን</span>
                    <span class="font-bold">ግንቦት 9 / 2018</span>
                </div>
                <div class="flex justify-between items-center border-b border-white/10 pb-2">
                    <span class="text-gray-400 text-xs">መነሻ ሰዓት</span>
                    <span class="font-bold">12:00 ጠዋት</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-gray-400 text-xs">የቲኬት ዋጋ</span>
                    <span class="text-amber-400 font-black">450 ETB</span>
                </div>
            </div>

            <div class="flex flex-col items-center">
                <div class="qr-container">
                    <div id="qrcode"></div>
                </div>
                <div class="mt-4 text-center">
                    <p class="text-[10px] text-gray-500 uppercase tracking-[0.3em]">Authorized by</p>
                    <p class="text-xs font-bold text-gray-300"></p>
                </div>
            </div>

            <div class="mt-8 pt-6 border-t border-dashed border-white/20 text-center">
                <div class="flex justify-center gap-4 text-xs font-mono text-amber-500/80 mb-3">
                    <span>0970984440</span>
                    <span>•</span>
                    <span>0948456209</span>
                </div>
                <p class="text-[10px] text-gray-400 italic">"ሰላም ለኪ እያልን በዝማሬ እንጓዛለን"</p>
            </div>
        </div>
    </div>

    <div class="no-print mt-8 flex flex-col items-center gap-4">
        <button onclick="window.print()" class="bg-amber-500 hover:bg-amber-600 text-black px-8 py-3 rounded-xl font-bold transition-all flex items-center gap-2">
            <span>🖨️</span> Print Ticket
        </button>
        <p class="text-gray-500 text-xs">Tip: Make sure <b>image_4c2574.jpg</b> is in your GitHub repo.</p>
    </div>

    <script>
        window.onload = function() {
            new QRCode(document.getElementById("qrcode"), {
                text: window.location.href,
                width: 120,
                height: 120,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        };
    </script>
</body>
</html>
