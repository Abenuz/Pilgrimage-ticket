<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የመንፈሳዊ በረከት ጉዞ ትኬት</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            background: #e5e7eb;
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .ticket-card {
            position: relative;
            background: white;
            filter: drop-shadow(0 20px 25px rgb(0 0 0 / 0.1));
        }

        /* Notched edges for ticket look */
        .ticket-card::before, .ticket-card::after {
            content: "";
            position: absolute;
            left: -15px;
            width: 30px;
            height: 30px;
            background: #e5e7eb;
            border-radius: 50%;
            z-index: 10;
        }
        .ticket-card::before { top: 65%; transform: translateY(-50%); }
        .ticket-card::after { right: -15px; left: auto; top: 65%; transform: translateY(-50%); }

        .header-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        .dashed-line {
            border-top: 2px dashed #e2e8f0;
            position: relative;
        }

        .ethiopian-pattern {
            background-color: #ffffff;
            background-image:  repeating-radial-gradient( circle at 0 0, transparent 0, #ffffff 10px ), repeating-linear-gradient( #f3f4f655, #f3f4f6 );
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="ticket-card max-w-sm w-full rounded-3xl overflow-hidden ethiopian-pattern">
        
        <!-- Image Section -->
        <div class="relative">
            <img src="image_57fa3f.jpg" alt="Bezawit Mariam" class="header-image" onerror="this.src='https://images.unsplash.com/photo-1548013146-72479768bbaa?auto=format&fit=crop&q=80&w=800'">
            <div class="absolute top-4 left-4">
                <span class="bg-green-600 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-tighter">Official Ticket</span>
            </div>
            <div class="absolute bottom-6 left-6 right-6">
                <h1 class="text-white text-2xl font-black leading-tight drop-shadow-lg">† ታላቅ መንፈሳዊ የበረከት ጉዞ</h1>
            </div>
        </div>

        <!-- Details Section -->
        <div class="px-8 pb-6 pt-2">
            <div class="space-y-6">
                
                <!-- Destination -->
                <div>
                    <label class="text-[10px] text-green-600 font-bold uppercase tracking-widest block mb-1">መድረሻ (Destination)</label>
                    <div class="flex items-center gap-3">
                        <div class="bg-green-100 p-2 rounded-lg text-green-700">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                        </div>
                        <p class="font-black text-xl text-gray-900">ቤዛዊት ማርያም ገዳም</p>
                    </div>
                </div>

                <!-- Logistics Grid -->
                <div class="grid grid-cols-2 gap-6 border-y border-gray-100 py-6">
                    <div>
                        <label class="text-[10px] text-gray-400 font-bold uppercase block mb-1">ቀን (Date)</label>
                        <p class="font-bold text-gray-800">ግንቦት 9 / 2018</p>
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 font-bold uppercase block mb-1">ሰዓት (Time)</label>
                        <p class="font-bold text-gray-800">12:00 ጠዋት</p>
                    </div>
                    <div class="col-span-2">
                        <label class="text-[10px] text-gray-400 font-bold uppercase block mb-1">መነሻ ቦታ (Pickup)</label>
                        <p class="font-bold text-gray-800 flex items-center gap-2">
                           <span class="w-2 h-2 bg-orange-500 rounded-full"></span> ቶታል ኪዳነ ምህረት
                        </p>
                    </div>
                </div>

                <!-- Pricing & Contact -->
                <div class="dashed-line pt-6">
                    <div class="flex justify-between items-end">
                        <div>
                            <label class="text-[10px] text-gray-400 font-bold uppercase block mb-1">የጉዞ ዋጋ (Price)</label>
                            <p class="text-3xl font-black text-green-700">450 <span class="text-sm font-bold uppercase">ብር</span></p>
                        </div>
                        <div class="text-right">
                            <label class="text-[10px] text-gray-400 font-bold uppercase block mb-1">ለበለጠ መረጃ</label>
                            <p class="text-sm font-black text-gray-800">0970984440</p>
                            <p class="text-sm font-black text-gray-800">0948456209</p>
                        </div>
                    </div>
                </div>

                <!-- Footer Note -->
                <div class="bg-green-700 text-white p-3 rounded-xl text-center shadow-md rotate-[-1deg]">
                    <p class="font-bold text-sm">🙏 በረከትን ያግኙ!</p>
                </div>
            </div>
        </div>

        <!-- Barcode Decorative Area -->
        <div class="bg-gray-50 p-6 flex flex-col items-center">
            <div class="flex items-end gap-[2px] h-8 mb-2 opacity-30">
                <div class="w-1 h-full bg-black"></div>
                <div class="w-[1px] h-full bg-black"></div>
                <div class="w-3 h-full bg-black"></div>
                <div class="w-[2px] h-full bg-black"></div>
                <div class="w-1 h-full bg-black"></div>
                <div class="w-[4px] h-full bg-black"></div>
                <div class="w-[1px] h-full bg-black"></div>
                <div class="w-2 h-full bg-black"></div>
                <div class="w-[2px] h-full bg-black"></div>
                <div class="w-1 h-full bg-black"></div>
                <div class="w-1 h-full bg-black"></div>
            </div>
            <p class="text-[8px] font-mono text-gray-400 tracking-[0.3em]">ETH-SPIRIT-2018-09-09</p>
        </div>
    </div>
    <div class="no-print mt-8 flex flex-col items-center gap-4">
        <button onclick="window.print()" class="bg-white text-black font-bold px-8 py-3 rounded-full hover:bg-gray-200 transition-colors shadow-lg">
            🖨️ ትኬቱን አትም (Print Ticket)
        </button>
</body>
</html>
